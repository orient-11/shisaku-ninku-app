<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>試作課 日報</title>
<style>
/* ===== リセット ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f4f8;
  color: #2d3748;
  font-size: 15px;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ===== ヘッダー ===== */
.header {
  background: #1a73e8;
  color: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.header h1 { font-size: 17px; font-weight: 700; }
.header .sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.setup-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

/* ===== タブ ===== */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 2px solid #e2e8f0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  flex: 1;
  min-width: 72px;
  padding: 11px 6px 9px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: #718096;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  white-space: nowrap;
  line-height: 1.4;
}
.tab .icon { display: block; font-size: 18px; margin-bottom: 2px; }
.tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }

/* ===== メイン ===== */
.main { padding: 14px; max-width: 860px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

/* ===== カード ===== */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 18px 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: #4a5568;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid #f0f4f8;
  display: flex;
  align-items: center;
  gap: 7px;
}

/* ===== フォーム ===== */
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.fg { flex: 1; min-width: 140px; }
.fg.full { flex: 1 0 100%; }
label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: #718096;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 5px;
}
select, input[type="text"], input[type="date"], input[type="number"], textarea {
  width: 100%;
  padding: 10px 11px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  color: #2d3748;
  background: #f7fafc;
  font-family: inherit;
  transition: border 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
select:focus, input:focus, textarea:focus {
  outline: none;
  border-color: #1a73e8;
  box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
  background: #fff;
}
textarea { resize: vertical; min-height: 52px; }

/* ===== ボタン ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 9px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}
.btn-primary  { background: #1a73e8; color: #fff; }
.btn-primary:hover  { background: #1557b0; }
.btn-success  { background: #38a169; color: #fff; }
.btn-success:hover  { background: #2f855a; }
.btn-danger   { background: #e53e3e; color: #fff; }
.btn-danger:hover   { background: #c53030; }
.btn-ghost    { background: #f0f4f8; color: #4a5568; }
.btn-ghost:hover    { background: #e2e8f0; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-full { width: 100%; padding: 13px; font-size: 15px; margin-top: 6px; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ===== 日報の作業行 ===== */
.work-row {
  background: #f7fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  padding: 13px 12px 10px;
  margin-bottom: 10px;
  position: relative;
}
.work-row .row { margin-bottom: 8px; }
.work-row .del-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  font-size: 18px;
  color: #cbd5e0;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: color 0.15s;
}
.work-row .del-btn:hover { color: #e53e3e; }

/* パーセント入力 */
.pct-wrap { position: relative; }
.pct-wrap input { padding-right: 28px; }
.pct-wrap::after { content: '%'; position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: #718096; font-size: 13px; pointer-events: none; }

/* プログレスバー（行内） */
.row-bar {
  height: 5px;
  background: #e2e8f0;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}
.row-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
  background: #1a73e8;
}

/* ===== 合計バー ===== */
.total-bar-card {
  background: #fff;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  padding: 14px 14px 10px;
  margin-bottom: 14px;
}
.total-bar-card.over  { border-color: #e53e3e; }
.total-bar-card.ok    { border-color: #38a169; }
.total-bar-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.total-bar-label .pct-num {
  font-size: 22px;
  font-weight: 700;
  color: #2d3748;
}
.total-bar-label .pct-num.ok   { color: #38a169; }
.total-bar-label .pct-num.over { color: #e53e3e; }
.total-bar-label .pct-hint {
  font-size: 12px;
  color: #718096;
}
.total-track {
  height: 10px;
  background: #e2e8f0;
  border-radius: 6px;
  overflow: hidden;
}
.total-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.3s, background 0.3s;
  background: #1a73e8;
}
.total-fill.ok   { background: #38a169; }
.total-fill.over { background: #e53e3e; }

/* 色パレット（作業行ごとの色） */
.color-0 { background: #1a73e8; }
.color-1 { background: #38a169; }
.color-2 { background: #ed8936; }
.color-3 { background: #805ad5; }
.color-4 { background: #e53e3e; }
.color-5 { background: #0bc5ea; }
.color-6 { background: #d69e2e; }
.color-7 { background: #e879a0; }

/* ===== 日報プレビュー（提出後） ===== */
.report-preview {
  background: #f7fafc;
  border-radius: 10px;
  padding: 16px;
}
.preview-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.preview-label {
  flex: 0 0 auto;
  width: 120px;
  font-size: 12px;
  font-weight: 700;
  color: #2d3748;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.preview-label .proc { font-size: 11px; font-weight: 400; color: #718096; display: block; }
.preview-bar-wrap { flex: 1; }
.preview-bar {
  height: 16px;
  border-radius: 4px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 4px;
}
.preview-pct {
  flex: 0 0 auto;
  font-size: 13px;
  font-weight: 700;
  color: #2d3748;
  width: 36px;
  text-align: right;
}
.preview-detail {
  font-size: 11px;
  color: #718096;
  width: 90px;
  text-align: right;
  white-space: nowrap;
}

/* ===== テーブル ===== */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: #f7fafc;
  padding: 9px 11px;
  text-align: left;
  font-weight: 700;
  color: #4a5568;
  border-bottom: 2px solid #e2e8f0;
  white-space: nowrap;
}
td { padding: 9px 11px; border-bottom: 1px solid #f0f4f8; }
tr:hover td { background: #f7fafc; }
.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.badge-blue  { background: #ebf8ff; color: #2b6cb0; }
.badge-green { background: #f0fff4; color: #276749; }
.badge-gray  { background: #f0f4f8; color: #4a5568; }
.badge-orange{ background: #fffaf0; color: #c05621; }

/* ===== サマリーカード群 ===== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; margin-bottom: 16px; }
.stat-card {
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  color: #fff;
}
.stat-card.blue   { background: linear-gradient(135deg, #1a73e8, #1557b0); }
.stat-card.green  { background: linear-gradient(135deg, #38a169, #2f855a); }
.stat-card.purple { background: linear-gradient(135deg, #805ad5, #6b46c1); }
.stat-card.orange { background: linear-gradient(135deg, #ed8936, #c05621); }
.stat-val   { font-size: 26px; font-weight: 700; }
.stat-label { font-size: 11px; opacity: 0.85; margin-top: 3px; }

/* ===== フィルターバー ===== */
.filter-bar { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 13px; margin-bottom: 14px; }
.filter-bar .row { margin-bottom: 8px; }
.filter-bar .row:last-child { margin-bottom: 0; }

/* ===== トースト ===== */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: #2d3748;
  color: #fff;
  padding: 11px 22px;
  border-radius: 30px;
  font-size: 13px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  z-index: 9999;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 88vw;
  text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok  { background: #38a169; }
#toast.err { background: #e53e3e; }
#toast.warn { background: #ed8936; }

/* ===== ローディング ===== */
.loading { text-align: center; padding: 32px; color: #a0aec0; font-size: 13px; }
.spin { display: inline-block; width: 26px; height: 26px; border: 3px solid #e2e8f0; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 36px 16px; color: #a0aec0; }
.empty .ei { font-size: 44px; margin-bottom: 10px; }

/* ===== レスポンシブ ===== */
@media (max-width: 560px) {
  .main { padding: 10px; }
  .preview-label { width: 90px; }
  .preview-detail { width: 70px; font-size: 10px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div>
    <h1>🧵 試作課 日報</h1>
    <div class="sub">作業時間・人工管理システム</div>
  </div>
  <button class="setup-btn" onclick="runSetup()">初期設定</button>
</header>

<nav class="tabs">
  <button class="tab active" onclick="switchTab('report', this)">
    <span class="icon">📝</span>日報入力
  </button>
  <button class="tab" onclick="switchTab('history', this)">
    <span class="icon">📋</span>履歴
  </button>
  <button class="tab" onclick="switchTab('summary', this)">
    <span class="icon">📊</span>集計
  </button>
  <button class="tab" onclick="switchTab('settings', this)">
    <span class="icon">⚙️</span>設定
  </button>
</nav>

<main class="main">

<!-- ====================================================
     TAB 1: 日報入力
===================================================== -->
<div id="tab-report" class="panel active">

  <!-- ヘッダー情報 -->
  <div class="card">
    <div class="card-title">👷 今日の日報を記録する</div>
    <div class="row">
      <div class="fg">
        <label>職人を選ぶ</label>
        <select id="r-craftsman">
          <option value="">-- 選択してください --</option>
        </select>
      </div>
      <div class="fg">
        <label>日付</label>
        <input type="date" id="r-date">
      </div>
    </div>
  </div>

  <!-- 合計バー -->
  <div class="total-bar-card" id="total-bar-card">
    <div class="total-bar-label">
      <div>
        <div class="pct-num" id="total-pct-num">0%</div>
        <div style="font-size:11px;color:#718096;">入力済み割合</div>
      </div>
      <div class="pct-hint" id="total-hint">残り 100% を入力してください</div>
    </div>
    <div class="total-track">
      <div class="total-fill" id="total-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- 作業行リスト -->
  <div id="work-rows-wrap"></div>

  <!-- 行追加ボタン -->
  <button class="btn btn-ghost btn-full" onclick="addWorkRow()" id="add-row-btn">
    ＋ 作業を追加する
  </button>

  <!-- 日次メモ -->
  <div class="card" style="margin-top:12px">
    <div class="card-title">📌 本日のメモ（任意）</div>
    <textarea id="r-daily-memo" placeholder="今日全体の特記事項・申し送りなど"></textarea>
  </div>

  <!-- 提出ボタン -->
  <button class="btn btn-success btn-full" onclick="submitReport()" id="submit-btn">
    ✔ 日報を提出する
  </button>

</div>

<!-- ====================================================
     TAB 2: 履歴
===================================================== -->
<div id="tab-history" class="panel">

  <div class="card">
    <div class="card-title">🔍 絞り込み</div>
    <div class="filter-bar">
      <div class="row">
        <div class="fg"><label>職人</label>
          <select id="h-craftsman"><option value="">すべて</option></select>
        </div>
        <div class="fg"><label>案件</label>
          <select id="h-schedule"><option value="">すべて</option></select>
        </div>
      </div>
      <div class="row">
        <div class="fg"><label>工程</label>
          <select id="h-process"><option value="">すべて</option></select>
        </div>
        <div class="fg"><label>期間（開始）</label>
          <input type="date" id="h-date-from">
        </div>
        <div class="fg"><label>期間（終了）</label>
          <input type="date" id="h-date-to">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary btn-sm" onclick="loadHistory()">検索</button>
        <button class="btn btn-ghost btn-sm" onclick="clearHistFilter()">クリア</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">作業履歴</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日付</th><th>職人</th><th>案件</th><th>工程</th>
            <th>割合</th><th>時間</th><th>人工数</th><th>メモ</th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr><td colspan="8" class="loading">上の検索ボタンを押してください</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ====================================================
     TAB 3: 集計
===================================================== -->
<div id="tab-summary" class="panel">

  <div class="card">
    <div class="card-title">🔍 集計フィルター</div>
    <div class="filter-bar">
      <div class="row">
        <div class="fg"><label>職人</label>
          <select id="s-craftsman"><option value="">すべて</option></select>
        </div>
        <div class="fg"><label>案件</label>
          <select id="s-schedule"><option value="">すべて</option></select>
        </div>
        <div class="fg"><label>工程</label>
          <select id="s-process"><option value="">すべて</option></select>
        </div>
      </div>
      <div class="row">
        <div class="fg"><label>期間（開始）</label>
          <input type="date" id="s-date-from">
        </div>
        <div class="fg"><label>期間（終了）</label>
          <input type="date" id="s-date-to">
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="loadSummary()" style="margin-top:4px">集計する</button>
    </div>
  </div>

  <div id="sum-stats" class="stat-grid" style="display:none"></div>

  <div class="card" id="sum-table-card" style="display:none">
    <div class="card-title">職人 × 案件 × 工程 集計</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>職人</th><th>案件</th><th>工程</th><th>合計時間</th><th>人工数</th><th>日数</th></tr>
        </thead>
        <tbody id="sum-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ====================================================
     TAB 4: 設定
===================================================== -->
<div id="tab-settings" class="panel">

  <!-- 職人管理 -->
  <div class="card">
    <div class="card-title">👷 職人管理</div>
    <div class="row">
      <div class="fg"><label>名前</label>
        <input type="text" id="add-c-name" placeholder="田中 太郎">
      </div>
      <div class="fg"><label>備考</label>
        <input type="text" id="add-c-note" placeholder="担当工程など">
      </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addCraftsman()">追加</button>
    <div id="list-craftsmen" style="margin-top:14px" class="loading">読み込み中...</div>
  </div>

  <!-- スケジュール管理 -->
  <div class="card">
    <div class="card-title">📁 案件管理</div>
    <div class="row">
      <div class="fg full"><label>案件名</label>
        <input type="text" id="add-s-name" placeholder="2024秋冬 トートバッグ A">
      </div>
    </div>
    <div class="row">
      <div class="fg"><label>開始日</label><input type="date" id="add-s-start"></div>
      <div class="fg"><label>終了日</label><input type="date" id="add-s-end"></div>
      <div class="fg"><label>ステータス</label>
        <select id="add-s-status">
          <option>進行中</option><option>完了</option><option>保留</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addSchedule()">追加</button>
    <div id="list-schedules" style="margin-top:14px" class="loading">読み込み中...</div>
  </div>

  <!-- 工程管理 -->
  <div class="card">
    <div class="card-title">🔧 工程管理</div>
    <div class="row">
      <div class="fg"><label>工程名</label>
        <input type="text" id="add-p-name" placeholder="例: 芯材貼り">
      </div>
      <div class="fg"><label>備考</label>
        <input type="text" id="add-p-note" placeholder="メモ">
      </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addProcess()">追加</button>
    <div id="list-processes" style="margin-top:14px" class="loading">読み込み中...</div>
  </div>

</div>
</main>

<div id="toast"></div>

<script>
// ============================================================
// 状態
// ============================================================
const st = {
  craftsmen: [], schedules: [], processes: [],
  workRowCount: 0
};

const COLORS = ['#1a73e8','#38a169','#ed8936','#805ad5','#e53e3e','#0bc5ea','#d69e2e','#e879a0'];

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // 今日の日付をセット
  document.getElementById('r-date').value = todayStr();
  loadInitial();
});

function loadInitial() {
  google.script.run
    .withSuccessHandler(d => {
      st.craftsmen = d.craftsmen || [];
      st.schedules = d.schedules || [];
      st.processes = d.processes || [];
      fillSelects();
      renderMasterLists();
      addWorkRow(); // 最初の行を追加
    })
    .withFailureHandler(() => {
      toast('データ取得に失敗しました。「初期設定」を実行してください。', 'err');
    })
    .getInitialData();
}

// ============================================================
// セレクト類をすべて更新
// ============================================================
function fillSelects() {
  // 日報入力
  fillSel('r-craftsman', st.craftsmen.map(c => c.name), '-- 選択してください --');
  // フィルター (複数)
  ['h-craftsman','s-craftsman'].forEach(id => fillSel(id, st.craftsmen.map(c=>c.name), 'すべて', true));
  ['h-schedule', 's-schedule'].forEach(id => fillSel(id, st.schedules.map(s=>s.name),  'すべて', true));
  ['h-process',  's-process' ].forEach(id => fillSel(id, st.processes.map(p=>p.name),  'すべて', true));
  // 既存の作業行の工程セレクトも更新
  document.querySelectorAll('.proc-sel').forEach(sel => {
    const cur = sel.value;
    fillSel(sel.id, st.processes.map(p=>p.name), '-- 工程を選ぶ --');
    sel.value = cur;
  });
  document.querySelectorAll('.sched-sel').forEach(sel => {
    const cur = sel.value;
    fillSel(sel.id, st.schedules.map(s=>s.name), '-- 案件を選ぶ --');
    sel.value = cur;
  });
}

function fillSel(id, items, placeholder, hasBlank) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  items.forEach(name => {
    const o = document.createElement('option');
    o.value = o.textContent = name;
    sel.appendChild(o);
  });
  sel.value = cur;
}

// ============================================================
// 作業行の追加
// ============================================================
function addWorkRow() {
  const idx = st.workRowCount++;
  const color = COLORS[idx % COLORS.length];
  const wrap = document.getElementById('work-rows-wrap');

  const div = document.createElement('div');
  div.className = 'work-row';
  div.id = 'wr-' + idx;
  div.dataset.idx = idx;
  div.innerHTML = `
    <button class="del-btn" onclick="removeWorkRow(${idx})" title="削除">✕</button>
    <div class="row">
      <div class="fg">
        <label>案件</label>
        <select id="wr-sched-${idx}" class="sched-sel" onchange="updateBars()">
          <option value="">-- 案件を選ぶ --</option>
          ${st.schedules.map(s => `<option>${esc(s.name)}</option>`).join('')}
        </select>
      </div>
      <div class="fg">
        <label>工程</label>
        <select id="wr-proc-${idx}" class="proc-sel" onchange="updateBars()">
          <option value="">-- 工程を選ぶ --</option>
          ${st.processes.map(p => `<option>${esc(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="fg" style="max-width:90px">
        <label>割合</label>
        <div class="pct-wrap">
          <input type="number" id="wr-pct-${idx}" class="pct-input"
            min="0" max="100" step="5" placeholder="0"
            oninput="updateBars()">
        </div>
      </div>
    </div>
    <div class="row-bar">
      <div class="row-bar-fill" id="wr-bar-${idx}" style="width:0%;background:${color}"></div>
    </div>
    <div style="margin-top:7px">
      <label>メモ（任意）</label>
      <input type="text" id="wr-memo-${idx}" placeholder="この作業の内容・特記事項">
    </div>
  `;
  wrap.appendChild(div);
  updateBars();
}

function removeWorkRow(idx) {
  const el = document.getElementById('wr-' + idx);
  if (el) el.remove();
  updateBars();
}

// ============================================================
// 合計バーの更新
// ============================================================
function updateBars() {
  const pctInputs = document.querySelectorAll('.pct-input');
  let total = 0;
  pctInputs.forEach(inp => {
    const v = Math.min(100, Math.max(0, Number(inp.value) || 0));
    const idx = inp.id.replace('wr-pct-', '');
    const bar = document.getElementById('wr-bar-' + idx);
    if (bar) bar.style.width = v + '%';
    total += v;
  });

  const numEl  = document.getElementById('total-pct-num');
  const fillEl = document.getElementById('total-fill');
  const hintEl = document.getElementById('total-hint');
  const cardEl = document.getElementById('total-bar-card');

  numEl.textContent = total + '%';
  const pct = Math.min(100, total);
  fillEl.style.width = pct + '%';

  numEl.className = 'pct-num ' + (total === 100 ? 'ok' : total > 100 ? 'over' : '');
  fillEl.className = 'total-fill ' + (total === 100 ? 'ok' : total > 100 ? 'over' : '');
  cardEl.className = 'total-bar-card ' + (total === 100 ? 'ok' : total > 100 ? 'over' : '');

  if (total === 100)      hintEl.textContent = '✔ 合計 100% — 完了です';
  else if (total > 100)   hintEl.textContent = `⚠ 合計 ${total}% — 100%を超えています`;
  else                    hintEl.textContent = `残り ${100 - total}% を入力してください`;
}

// ============================================================
// 日報提出
// ============================================================
function submitReport() {
  const craftsmanName = document.getElementById('r-craftsman').value;
  const dateStr       = document.getElementById('r-date').value;
  const dailyMemo     = document.getElementById('r-daily-memo').value;

  if (!craftsmanName) { toast('職人を選択してください', 'err'); return; }
  if (!dateStr)        { toast('日付を入力してください', 'err'); return; }

  // 作業行を収集
  const rows = [];
  document.querySelectorAll('.work-row').forEach(wr => {
    const idx = wr.dataset.idx;
    const pct = Number(document.getElementById(`wr-pct-${idx}`)?.value) || 0;
    if (pct <= 0) return;
    rows.push({
      scheduleName: document.getElementById(`wr-sched-${idx}`)?.value || '',
      processName:  document.getElementById(`wr-proc-${idx}`)?.value  || '',
      pct:          pct,
      memo:         document.getElementById(`wr-memo-${idx}`)?.value  || ''
    });
  });

  if (rows.length === 0) { toast('割合を入力した作業行がありません', 'err'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '提出中...';

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false;
      btn.textContent = '✔ 日報を提出する';
      if (!res.success) { toast(res.message, 'err'); return; }
      toast(res.message, res.warning ? 'warn' : 'ok');
      showPreview(craftsmanName, dateStr, rows);
      resetForm();
    })
    .withFailureHandler(() => {
      btn.disabled = false;
      btn.textContent = '✔ 日報を提出する';
      toast('提出に失敗しました', 'err');
    })
    .submitDailyReport(craftsmanName, dateStr, rows, dailyMemo);
}

function resetForm() {
  document.getElementById('r-craftsman').value = '';
  document.getElementById('r-date').value = todayStr();
  document.getElementById('r-daily-memo').value = '';
  document.getElementById('work-rows-wrap').innerHTML = '';
  st.workRowCount = 0;
  addWorkRow();
  updateBars();
}

// ============================================================
// 提出後プレビュー（バー表示）
// ============================================================
function showPreview(craftsmanName, dateStr, rows) {
  const existing = document.getElementById('preview-card');
  if (existing) existing.remove();

  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'preview-card';
  const totalHours = rows.reduce((s, r) => s + r.pct / 100 * 8, 0);
  const totalNinku = (totalHours / 8).toFixed(3);

  card.innerHTML = `
    <div class="card-title">✅ 提出済み日報 — ${esc(craftsmanName)} / ${esc(dateStr)}</div>
    <div class="report-preview" id="preview-body"></div>
    <div style="margin-top:10px;font-size:12px;color:#718096;text-align:right">
      合計: <strong>${totalHours.toFixed(1)}h</strong> ／ <strong>${totalNinku} 人工</strong>
    </div>
  `;
  document.getElementById('tab-report').insertBefore(card, document.querySelector('.card'));

  const body = card.querySelector('#preview-body');
  rows.forEach((r, i) => {
    const color = COLORS[i % COLORS.length];
    const hours = (r.pct / 100 * 8).toFixed(1);
    const ninku = (r.pct / 100).toFixed(2);
    const row = document.createElement('div');
    row.className = 'preview-row';
    row.innerHTML = `
      <div class="preview-label">
        ${esc(r.scheduleName || '（案件なし）')}
        <span class="proc">${esc(r.processName)}</span>
      </div>
      <div class="preview-bar-wrap">
        <div class="preview-bar" style="width:${r.pct}%;background:${color}"></div>
      </div>
      <div class="preview-pct">${r.pct}%</div>
      <div class="preview-detail">${hours}h / ${ninku}人工</div>
    `;
    body.appendChild(row);
  });
}

// ============================================================
// 履歴
// ============================================================
function loadHistory() {
  const params = [
    document.getElementById('h-craftsman').value || null,
    document.getElementById('h-schedule').value  || null,
    document.getElementById('h-process').value   || null,
    document.getElementById('h-date-from').value || null,
    document.getElementById('h-date-to').value   || null
  ];
  document.getElementById('history-body').innerHTML =
    '<tr><td colspan="8" class="loading"><div class="spin"></div><br>読み込み中...</td></tr>';

  google.script.run
    .withSuccessHandler(logs => {
      const tb = document.getElementById('history-body');
      if (!logs || logs.length === 0) {
        tb.innerHTML = '<tr><td colspan="8" class="empty">該当データなし</td></tr>';
        return;
      }
      tb.innerHTML = logs.map(l => `
        <tr>
          <td>${esc(String(l.date))}</td>
          <td><span class="badge badge-blue">${esc(l.craftsmanName)}</span></td>
          <td>${esc(l.scheduleName)}</td>
          <td><span class="badge badge-gray">${esc(l.processName)}</span></td>
          <td style="font-weight:700;color:#1a73e8">${l.pct}%</td>
          <td>${Number(l.hours).toFixed(1)}h</td>
          <td><strong>${Number(l.ninkuCount).toFixed(3)}</strong></td>
          <td style="color:#718096;font-size:12px">${esc(l.memo)}</td>
        </tr>
      `).join('');
    })
    .withFailureHandler(() => toast('履歴の取得に失敗しました', 'err'))
    .getLogs(...params);
}

function clearHistFilter() {
  ['h-craftsman','h-schedule','h-process','h-date-from','h-date-to']
    .forEach(id => { document.getElementById(id).value = ''; });
}

// ============================================================
// 集計
// ============================================================
function loadSummary() {
  const params = [
    document.getElementById('s-craftsman').value || null,
    document.getElementById('s-schedule').value  || null,
    document.getElementById('s-process').value   || null,
    document.getElementById('s-date-from').value || null,
    document.getElementById('s-date-to').value   || null
  ];

  google.script.run
    .withSuccessHandler(data => {
      if (!data || !data.length) { toast('集計データがありません', 'err'); return; }

      const totH = data.reduce((s,d) => s + Number(d.totalHours), 0);
      const totN = data.reduce((s,d) => s + Number(d.totalNinku), 0);
      const uniq = new Set(data.map(d => d.craftsmanName)).size;
      const projUniq = new Set(data.map(d => d.scheduleName)).size;

      const stats = document.getElementById('sum-stats');
      stats.style.display = 'grid';
      stats.innerHTML = `
        <div class="stat-card blue"><div class="stat-val">${totN.toFixed(2)}</div><div class="stat-label">合計人工数</div></div>
        <div class="stat-card green"><div class="stat-val">${totH.toFixed(1)}h</div><div class="stat-label">合計作業時間</div></div>
        <div class="stat-card purple"><div class="stat-val">${uniq}</div><div class="stat-label">稼働職人数</div></div>
        <div class="stat-card orange"><div class="stat-val">${projUniq}</div><div class="stat-label">対象案件数</div></div>
      `;

      const tb = document.getElementById('sum-body');
      tb.innerHTML = data.map(r => `
        <tr>
          <td><span class="badge badge-blue">${esc(r.craftsmanName)}</span></td>
          <td>${esc(r.scheduleName)}</td>
          <td><span class="badge badge-gray">${esc(r.processName)}</span></td>
          <td>${r.totalHours}h</td>
          <td><strong style="color:#1a73e8;font-size:15px">${r.totalNinku}</strong> 人工</td>
          <td style="color:#718096">${r.count}日</td>
        </tr>
      `).join('');
      document.getElementById('sum-table-card').style.display = 'block';
    })
    .withFailureHandler(() => toast('集計に失敗しました', 'err'))
    .getSummary(...params);
}

// ============================================================
// 設定: マスター管理
// ============================================================
function addCraftsman() {
  const name = document.getElementById('add-c-name').value.trim();
  const note = document.getElementById('add-c-note').value.trim();
  if (!name) { toast('名前を入力してください', 'err'); return; }
  google.script.run
    .withSuccessHandler(r => { toast(r.message, r.success?'ok':'err'); if(r.success){document.getElementById('add-c-name').value=''; loadInitial();} })
    .addCraftsman(name, note);
}
function deleteCraftsman(name) {
  if(!confirm(`「${name}」を削除しますか？`)) return;
  google.script.run.withSuccessHandler(r=>{toast(r.message,r.success?'ok':'err');if(r.success)loadInitial();}).deleteCraftsman(name);
}
function addSchedule() {
  const name = document.getElementById('add-s-name').value.trim();
  if (!name) { toast('案件名を入力してください', 'err'); return; }
  const s = document.getElementById('add-s-start').value;
  const e = document.getElementById('add-s-end').value;
  const st2 = document.getElementById('add-s-status').value;
  google.script.run
    .withSuccessHandler(r => { toast(r.message, r.success?'ok':'err'); if(r.success){document.getElementById('add-s-name').value=''; loadInitial();} })
    .addSchedule(name, s, e, st2, '');
}
function deleteSchedule(name) {
  if(!confirm(`「${name}」を削除しますか？`)) return;
  google.script.run.withSuccessHandler(r=>{toast(r.message,r.success?'ok':'err');if(r.success)loadInitial();}).deleteSchedule(name);
}
function addProcess() {
  const name = document.getElementById('add-p-name').value.trim();
  const note = document.getElementById('add-p-note').value.trim();
  if (!name) { toast('工程名を入力してください', 'err'); return; }
  google.script.run
    .withSuccessHandler(r => { toast(r.message, r.success?'ok':'err'); if(r.success){document.getElementById('add-p-name').value=''; loadInitial();} })
    .addProcess(name, note);
}
function deleteProcess(name) {
  if(!confirm(`工程「${name}」を削除しますか？`)) return;
  google.script.run.withSuccessHandler(r=>{toast(r.message,r.success?'ok':'err');if(r.success)loadInitial();}).deleteProcess(name);
}

function renderMasterLists() {
  // 職人リスト
  const cl = document.getElementById('list-craftsmen');
  cl.innerHTML = st.craftsmen.length ? masterTable(
    ['ID','名前','備考'],
    st.craftsmen.map(c => [c.id, `<strong>${esc(c.name)}</strong>`, esc(c.note),
      `<button class="btn btn-danger btn-sm" onclick="deleteCraftsman('${esc(c.name)}')">削除</button>`])
  ) : '<div class="empty"><p>職人が未登録です</p></div>';

  // 案件リスト
  const sl = document.getElementById('list-schedules');
  sl.innerHTML = st.schedules.length ? masterTable(
    ['案件名','開始日','終了日','状態'],
    st.schedules.map(s => [
      `<strong>${esc(s.name)}</strong>`, esc(s.startDate), esc(s.endDate),
      `<span class="badge ${s.status==='完了'?'badge-green':'badge-blue'}">${esc(s.status)}</span>`,
      `<button class="btn btn-danger btn-sm" onclick="deleteSchedule('${esc(s.name)}')">削除</button>`])
  ) : '<div class="empty"><p>案件が未登録です</p></div>';

  // 工程リスト
  const pl = document.getElementById('list-processes');
  pl.innerHTML = st.processes.length ? masterTable(
    ['ID','工程名','備考'],
    st.processes.map(p => [p.id, `<strong>${esc(p.name)}</strong>`, esc(p.note),
      `<button class="btn btn-danger btn-sm" onclick="deleteProcess('${esc(p.name)}')">削除</button>`])
  ) : '<div class="empty"><p>工程が未登録です</p></div>';
}

function masterTable(headers, rows) {
  return `<div class="table-wrap"><table>
    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th></th></tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

// ============================================================
// 初期設定

function runSetup() {
  if (!confirm('シートの初期設定を実行します。よろしいですか？')) return;
  google.script.run
    .withSuccessHandler(r => { toast(r.message, 'ok'); loadInitial(); })
    .withFailureHandler(() => toast('初期設定に失敗しました', 'err'))
    .setup();

// ============================================================
// タブ切り替え
// ============================================================
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ============================================================
// ユーティリティ
// ============================================================
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
let toastTmr;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type||'');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.className = '', 3800);
}
